<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 Türkçe Çarkıfelek</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');
:root{
  --bg:#0d1b2a;--panel:#1b2e44;--gold:#f7c948;--red:#ff6b6b;
  --teal:#4ecdc4;--purple:#a29bfe;--green:#55efc4;--text:#f0f4ff;--dim:#8899aa;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(162,155,254,.08) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 80%,rgba(78,205,196,.08) 0%,transparent 60%);
  pointer-events:none;z-index:0;}

.wrapper{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px;gap:18px;}

/* HEADER */
.header{text-align:center;}
.header h1{font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,5vw,3rem);
  background:linear-gradient(135deg,var(--gold),var(--red),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header p{color:var(--dim);font-size:.88rem;margin-top:4px;}

/* SCOREBOARD */
.scoreboard{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.team-card{background:var(--panel);border:2px solid transparent;border-radius:16px;
  padding:10px 22px;text-align:center;cursor:pointer;transition:all .2s;min-width:110px;}
.team-card.active{border-color:var(--gold);box-shadow:0 0 18px rgba(247,201,72,.35);}
.team-card .tname{font-size:.72rem;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.team-card .tscore{font-family:'Fredoka One',cursive;font-size:1.9rem;color:var(--gold);line-height:1.1;}
.team-card .tpending{font-size:.7rem;color:var(--teal);}

/* GAME AREA */
.game-area{display:flex;flex-wrap:wrap;gap:22px;justify-content:center;align-items:flex-start;width:100%;max-width:1100px;}

/* WHEEL */
.wheel-side{display:flex;flex-direction:column;align-items:center;gap:12px;}
.wheel-container{position:relative;width:min(300px,76vw);height:min(300px,76vw);}
canvas#wc{width:100%;height:100%;border-radius:50%;filter:drop-shadow(0 0 22px rgba(247,201,72,.3));}
.wheel-arrow{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:2rem;z-index:10;}
.spin-btn{font-family:'Fredoka One',cursive;font-size:1.2rem;
  background:linear-gradient(135deg,var(--gold),#e0a800);color:#1a1a1a;
  border:none;border-radius:50px;padding:11px 36px;cursor:pointer;
  transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(247,201,72,.4);}
.spin-btn:hover:not(:disabled){transform:scale(1.05);box-shadow:0 6px 28px rgba(247,201,72,.5);}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.spin-result{font-family:'Fredoka One',cursive;font-size:1.35rem;min-height:1.9rem;text-align:center;}

/* PUZZLE SIDE */
.puzzle-side{flex:1;min-width:290px;display:flex;flex-direction:column;gap:12px;}
.category-badge{display:inline-block;padding:5px 16px;border-radius:50px;font-weight:800;
  font-size:.78rem;text-transform:uppercase;letter-spacing:1.5px;align-self:flex-start;}
.cat-deyim{background:rgba(162,155,254,.2);color:var(--purple);border:1px solid var(--purple);}
.cat-atasoz{background:rgba(78,205,196,.2);color:var(--teal);border:1px solid var(--teal);}

/* PUZZLE TILES */
.puzzle-display{display:flex;flex-wrap:wrap;gap:4px;padding:14px;
  background:rgba(255,255,255,.04);border-radius:14px;
  border:1px solid rgba(255,255,255,.08);min-height:70px;align-items:center;}
.word-group{display:flex;flex-wrap:wrap;gap:3px;margin-right:5px;margin-bottom:4px;}
.letter-tile{width:29px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:7px;font-family:'Fredoka One',cursive;font-size:.95rem;border-bottom:3px solid;transition:all .3s;}
.letter-tile.hidden{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);color:transparent;}
.letter-tile.revealed{background:rgba(247,201,72,.15);border-color:var(--gold);color:var(--gold);
  animation:popIn .3s cubic-bezier(.36,1.56,.64,1);}
.letter-tile.special{background:transparent;border:none;border-bottom:none;color:rgba(255,255,255,.4);font-size:1.3rem;}
@keyframes popIn{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}

/* INPUT */
.input-area{display:flex;gap:8px;align-items:center;}
.letter-input{width:54px;height:54px;border-radius:10px;background:var(--panel);
  border:2px solid var(--purple);color:var(--text);font-family:'Fredoka One',cursive;
  font-size:1.7rem;text-align:center;text-transform:uppercase;outline:none;transition:border-color .2s;}
.letter-input:focus{border-color:var(--gold);}
.guess-btn{flex:1;font-family:'Fredoka One',cursive;font-size:.98rem;
  background:linear-gradient(135deg,var(--purple),#6c5ce7);color:#fff;
  border:none;border-radius:10px;padding:12px 14px;cursor:pointer;transition:transform .15s,opacity .15s;}
.guess-btn:hover:not(:disabled){transform:scale(1.03);}
.guess-btn:disabled{opacity:.4;cursor:not-allowed;}
.solve-btn{flex:1;font-family:'Fredoka One',cursive;font-size:.98rem;
  background:linear-gradient(135deg,var(--teal),#00b894);color:#1a1a1a;
  border:none;border-radius:10px;padding:12px 14px;cursor:pointer;transition:transform .15s,opacity .15s;}
.solve-btn:hover:not(:disabled){transform:scale(1.03);}
.solve-btn:disabled{opacity:.4;cursor:not-allowed;}

/* USED LETTERS */
.used-letters{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.used-letters span{font-size:.7rem;color:var(--dim);font-weight:700;text-transform:uppercase;}
.used-pill{padding:2px 9px;border-radius:50px;font-family:'Fredoka One',cursive;font-size:.85rem;}
.used-pill.hit{background:rgba(85,239,196,.15);color:var(--green);border:1px solid var(--green);}
.used-pill.miss{background:rgba(255,107,107,.15);color:var(--red);border:1px solid var(--red);}

/* MESSAGE */
.message-box{padding:11px 16px;border-radius:10px;font-weight:700;font-size:.88rem;
  min-height:44px;display:flex;align-items:center;gap:6px;line-height:1.4;}
.msg-info{background:rgba(162,155,254,.15);border:1px solid rgba(162,155,254,.3);color:var(--purple);}
.msg-good{background:rgba(85,239,196,.15);border:1px solid rgba(85,239,196,.3);color:var(--green);}
.msg-bad{background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.3);color:var(--red);}
.msg-win{background:rgba(247,201,72,.2);border:1px solid var(--gold);color:var(--gold);}

/* CONTROLS */
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.ctrl-btn{font-family:'Fredoka One',cursive;font-size:.83rem;padding:7px 16px;
  border-radius:50px;border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.05);color:var(--dim);cursor:pointer;transition:all .2s;}
.ctrl-btn:hover{background:rgba(255,255,255,.1);color:var(--text);}

/* EXPLANATION BOX */
.explanation-box{
  background:linear-gradient(135deg,rgba(247,201,72,.12),rgba(162,155,254,.1));
  border:1px solid rgba(247,201,72,.35);border-radius:14px;
  padding:14px 18px;display:none;
}
.explanation-box.show{display:block;}
.explanation-box .ex-title{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--gold);margin-bottom:6px;}
.explanation-box .ex-text{font-size:.88rem;color:var(--text);line-height:1.6;opacity:.9;}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);
  display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(5px);}
.modal-overlay.show{display:flex;}
.modal{background:var(--panel);border:2px solid var(--gold);border-radius:20px;
  padding:26px;max-width:440px;width:90%;text-align:center;
  box-shadow:0 0 60px rgba(247,201,72,.25);}
.modal h2{font-family:'Fredoka One',cursive;font-size:1.65rem;color:var(--gold);margin-bottom:8px;}
.modal p{color:var(--dim);margin-bottom:14px;font-size:.88rem;}
.modal-input{width:100%;padding:11px 14px;border-radius:9px;background:var(--bg);
  border:2px solid var(--purple);color:var(--text);font-family:'Nunito',sans-serif;
  font-size:.95rem;font-weight:700;outline:none;margin-bottom:12px;}
.modal-input:focus{border-color:var(--gold);}
.modal-actions{display:flex;gap:8px;}
.modal-confirm{flex:1;font-family:'Fredoka One',cursive;font-size:1.05rem;
  background:linear-gradient(135deg,var(--gold),#e0a800);color:#1a1a1a;
  border:none;border-radius:9px;padding:11px;cursor:pointer;}
.modal-cancel{flex:1;font-family:'Fredoka One',cursive;font-size:1.05rem;
  background:rgba(255,107,107,.2);color:var(--red);border:1px solid var(--red);
  border-radius:9px;padding:11px;cursor:pointer;}

/* CONFETTI & FLASH */
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.confetti{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;animation:confettiFall 2s ease-in forwards;z-index:200;}
.bankrupt-flash{position:fixed;inset:0;background:rgba(255,0,0,.18);pointer-events:none;z-index:50;opacity:0;transition:opacity .1s;}
.bankrupt-flash.show{opacity:1;}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>🎡 Türkçe Çarkıfelek</h1>
    <p>Çarkı çevir &bull; Harf söyle &bull; Deyimi ya da atasözünü bul!</p>
  </div>

  <div class="scoreboard" id="sb"></div>

  <div class="game-area">
    <!-- WHEEL -->
    <div class="wheel-side">
      <div class="wheel-container">
        <div class="wheel-arrow">▼</div>
        <canvas id="wc" width="400" height="400"></canvas>
      </div>
      <div class="spin-result" id="spinResult">—</div>
      <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🎰 Çarkı Çevir</button>
    </div>

    <!-- PUZZLE -->
    <div class="puzzle-side">
      <div id="badge" class="category-badge cat-deyim">💬 DEYİM</div>
      <div class="puzzle-display" id="pd"></div>
      <div class="used-letters" id="ul"><span>Kullanılan:</span></div>
      <div class="message-box msg-info" id="msg">✨ Çarkı çevirerek başla!</div>

      <div class="input-area">
        <input class="letter-input" id="li" maxlength="1" placeholder="?" disabled
          onkeydown="if(event.key==='Enter')guessLetter()">
        <button class="guess-btn" id="gb" onclick="guessLetter()" disabled>Harf Söyle</button>
        <button class="solve-btn" id="slvb" onclick="openModal()" disabled>🎯 Çöz!</button>
      </div>

      <!-- EXPLANATION -->
      <div class="explanation-box" id="exBox">
        <div class="ex-title" id="exTitle"></div>
        <div class="ex-text" id="exText"></div>
      </div>

      <div class="controls">
        <button class="ctrl-btn" onclick="newPuzzle()">🔄 Yeni Soru</button>
        <button class="ctrl-btn" onclick="addTeam()">➕ Takım Ekle</button>
        <button class="ctrl-btn" onclick="skipTurn()">➡️ Sırayı Geç</button>
      </div>
    </div>
  </div>
</div>

<!-- SOLVE MODAL -->
<div class="modal-overlay" id="mo">
  <div class="modal">
    <h2>🎯 Tümünü Çöz!</h2>
    <p>Deyimi / atasözünü eksiksiz yaz ve büyük puan kazan!</p>
    <input class="modal-input" id="si" placeholder="Cevabını yaz..." onkeydown="if(event.key==='Enter')confirmSolve()">
    <div class="modal-actions">
      <button class="modal-confirm" onclick="confirmSolve()">✅ Cevapla</button>
      <button class="modal-cancel" onclick="closeModal()">İptal</button>
    </div>
  </div>
</div>

<div class="bankrupt-flash" id="bf"></div>

<script>

const cv=document.getElementById('wc');
const cx=cv.getContext('2d');
const W=400,H=400,R=180,CX=200,CY=200;

function drawWheel(a){
  cx.clearRect(0,0,W,H);
  const n=SEGS.length, arc=(2*Math.PI)/n;
  for(let i=0;i<n;i++){
    const s=SEGS[i],st=a+i*arc,en=st+arc;
    cx.beginPath();cx.moveTo(CX,CY);cx.arc(CX,CY,R,st,en);cx.closePath();
    cx.fillStyle=s.c;cx.fill();
    cx.strokeStyle='rgba(0,0,0,.3)';cx.lineWidth=2;cx.stroke();
  }
  for(let i=0;i<n;i++){
    const s=SEGS[i], mid=a+i*arc+arc/2;
    cx.save();cx.translate(CX,CY);cx.rotate(mid);
    cx.textAlign='right';cx.fillStyle=s.t;
    const fs=s.l.length>5?'8':s.l.length>3?'10':'12';
    cx.font=`bold ${fs}px Nunito,sans-serif`;
    cx.fillText(s.l,R-7,5);cx.restore();
  }
  cx.beginPath();cx.arc(CX,CY,18,0,2*Math.PI);
  cx.fillStyle='#0d1b2a';cx.fill();
  cx.strokeStyle='#f7c948';cx.lineWidth=3;cx.stroke();
  cx.fillStyle='#f7c948';cx.font='bold 13px sans-serif';
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('★',CX,CY);
}

// ═══════════════════════════════════════════════════════════════
// ÇARKI ÇEVİR
// ═══════════════════════════════════════════════════════════════
function spinWheel(){
  if(spinning||canGuess)return;
  spinning=true; setGuess(false);
  const total=(Math.random()*6+8)*Math.PI*2, dur=3500+Math.random()*1000;
  const startA=wAngle, t0=performance.now();
  function ease(t){return t<.5?2*t*t:-1+(4-2*t)*t;}
  function frame(now){
    const t=Math.min((now-t0)/dur,1);
    wAngle=startA+total*ease(t); drawWheel(wAngle);
    if(t<1){requestAnimationFrame(frame);}
    else{spinning=false;wAngle=wAngle%(2*Math.PI);onSpinDone();}
  }
  requestAnimationFrame(frame);
}

function onSpinDone(){
  const n=SEGS.length, arc=(2*Math.PI)/n;
  const arrowA=Math.PI*1.5;
  let norm=((arrowA-wAngle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  const idx=Math.floor(norm/arc)%n, seg=SEGS[idx];
  const sr=document.getElementById('spinResult');

  if(seg.v==='bankrupt'){
    sr.textContent='💀 İFLAS!'; sr.style.color='#ff6b6b';
    teams[cur].score=0; teams[cur].pending=0; updateSB();
    showMsg('💀 İFLAS! Tüm puanlar silindi.','bad');
    document.getElementById('bf').classList.add('show');
    setTimeout(()=>document.getElementById('bf').classList.remove('show'),600);
    setTimeout(()=>nextTurn(true),1800);
  } else if(seg.v==='lose'){
    sr.textContent='😭 Sıra geçti!'; sr.style.color='#636e72';
    teams[cur].pending=0; updateSB();
    showMsg('😭 Sıra geçti! Sonraki takım.','bad');
    setTimeout(()=>nextTurn(true),1800);
  } else {
    sr.textContent=`✨ ${seg.l} puan!`; sr.style.color='#f7c948';
    spinVal=seg.v; canGuess=true; setGuess(true);
    showMsg(`🎯 ${seg.l} puan! Bir harf söyle.`,'info');
  }
}

// BULMACA SEÇ & RENDER
// ═══════════════════════════════════════════════════════════════
function pickPuzzle(){
  const dKeys=Object.keys(DEYIMLER);
  const aKeys=Object.keys(ATASOZLERI);
  const isDeyim=Math.random()>.45;
  const pool=isDeyim?dKeys:aKeys;
  const key=pool[Math.floor(Math.random()*pool.length)];
  const explanation=isDeyim?DEYIMLER[key]:ATASOZLERI[key];
  return{text:key.toUpperCase(), original:key, type:isDeyim?'deyim':'atasoz', explanation};
}

function newPuzzle(){
  puzzle=pickPuzzle();
  revealed=new Set([' ',',','!','.','-',"'"]);
  usedL=[]; spinVal=null; canGuess=false;
  setGuess(false);
  document.getElementById('spinResult').textContent='—';
  document.getElementById('spinResult').style.color='';
  document.getElementById('spinBtn').disabled=false;
  // Hide explanation
  document.getElementById('exBox').classList.remove('show');

  const b=document.getElementById('badge');
  if(puzzle.type==='deyim'){b.textContent='💬 DEYİM';b.className='category-badge cat-deyim';}
  else{b.textContent='📜 ATASÖZÜ';b.className='category-badge cat-atasoz';}

  renderPuzzle(); renderUsed();
  showMsg('✨ Çarkı çevirerek başla!','info');
  updateSB();
}

function renderPuzzle(){
  const pd=document.getElementById('pd'); pd.innerHTML='';
  const words=puzzle.text.split(' ');
  words.forEach(word=>{
    const wg=document.createElement('div'); wg.className='word-group';
    for(const ch of word){
      const tile=document.createElement('div');
      const special=',!.-\''.includes(ch);
      if(special){
        tile.className='letter-tile special'; tile.textContent=ch;
      } else {
        tile.className='letter-tile '+(revealed.has(ch)?'revealed':'hidden');
        tile.textContent=revealed.has(ch)?ch:'';
        tile.dataset.char=ch;
      }
      wg.appendChild(tile);
    }
    pd.appendChild(wg);
  });
}

function checkWin(){
  for(const ch of puzzle.text){
    if(' ,!.-\''.includes(ch))continue;
    if(!revealed.has(ch))return false;
  }
  return true;
}

// HARF TAHMİNİ
// ═══════════════════════════════════════════════════════════════
function guessLetter(){
  if(!canGuess)return;
  const inp=document.getElementById('li');
  let l=inp.value.trim(); inp.value='';
  if(!l)return;

  // Türkçe küçük→büyük harf dönüşümü
  const lmap={'i':'İ','ı':'I','ş':'Ş','ğ':'Ğ','ö':'Ö','ü':'Ü','ç':'Ç'};
  l=l.replace(/./,m=>lmap[m]||m.toUpperCase());

  if(usedL.includes(l)){showMsg('⚠️ Bu harf zaten söylendi!','bad');return;}
  usedL.push(l);

  const cnt=puzzle.text.split('').filter(c=>c===l).length;

  if(cnt>0){
    revealed.add(l);
    const earned=cnt*spinVal;
    // ✅ FIX: pending birikir, her doğru harfte eklenir
    teams[cur].pending+=earned;
    updateSB();
    renderPuzzle(); renderUsed();
    showMsg(`✅ "${l}" harfi ${cnt} kez geçiyor! +${earned} puan (Toplam bekleme: ${teams[cur].pending})`, 'good');
    // Çarkı tekrar çevirebilir
    canGuess=false; setGuess(false);
    document.getElementById('spinBtn').disabled=false;

    if(checkWin()) setTimeout(()=>winRound(),400);
  } else {
    usedL[usedL.length-1]=l+'_miss';
    renderUsed();
    showMsg(`❌ "${l}" harfi yok. Sıra geçti.`,'bad');
    canGuess=false; setGuess(false);
    teams[cur].pending=0; updateSB();
    setTimeout(()=>nextTurn(true),1800);
  }
}

function renderUsed(){
  const ul=document.getElementById('ul'); ul.innerHTML='<span>Kullanılan:</span>';
  usedL.forEach(raw=>{
    const isMiss=raw.endsWith('_miss');
    const l=isMiss?raw.replace('_miss',''):raw;
    const p=document.createElement('span');
    p.className='used-pill '+(isMiss?'miss':'hit');
    p.textContent=l; ul.appendChild(p);
  });
}

function openModal(){
  document.getElementById('mo').classList.add('show');
  document.getElementById('si').value='';
  setTimeout(()=>document.getElementById('si').focus(),100);
}
function closeModal(){document.getElementById('mo').classList.remove('show');}

function confirmSolve(){
  const inp=document.getElementById('si').value.trim().toUpperCase();
  const ans=puzzle.text;
  function norm(s){return s.replace(/[',.\-!]/g,'').replace(/\s+/g,' ').trim();}
  closeModal();
  if(norm(inp)===norm(ans)){
    revealed=new Set(ans.split(''));
    renderPuzzle();
    winRound(true);
  } else {
    showMsg('❌ Yanlış cevap! Sıra geçti.','bad');
    canGuess=false; setGuess(false);
    teams[cur].pending=0; updateSB();
    setTimeout(()=>nextTurn(true),1800);
  }
}

function winRound(bonus=false){
  const t=teams[cur];
  const bonusPts=bonus?500:0;
  t.score+=t.pending+bonusPts;
  t.pending=0;
  updateSB();
  setGuess(false); canGuess=false;
  document.getElementById('spinBtn').disabled=true;

  const bonusTxt=bonus?' +500 BONUS puan!':'';
  showMsg(`🏆 ${t.name} kazandı!${bonusTxt} "Yeni Soru" ile devam et.`,'win');
  spawnConfetti();

  // Açıklama göster
  showExplanation();
}

function showExplanation(){
  const box=document.getElementById('exBox');
  const title=document.getElementById('exTitle');
  const text=document.getElementById('exText');

  const typeTxt=puzzle.type==='deyim'?'💬 DEYİM ANLAMI':'📜 ATASÖZÜ ANLAMI';
  title.textContent=`${typeTxt}: "${puzzle.original}"`;
  text.textContent=puzzle.explanation||'Açıklama bulunamadı.';
  box.classList.add('show');
}

function nextTurn(auto=false){
  if(!auto) teams[cur].pending=0;
  cur=(cur+1)%teams.length;
  canGuess=false; setGuess(false);
  updateSB();
  if(auto){
    document.getElementById('spinResult').textContent='—';
    document.getElementById('spinResult').style.color='';
    document.getElementById('spinBtn').disabled=false;
    showMsg(`🎮 Sıra: ${teams[cur].name}! Çarkı çevir.`,'info');
  }
}
function skipTurn(){
  teams[cur].pending=0;
  nextTurn(true);
}

function addTeam(){
  if(teams.length>=6){alert('En fazla 6 takım!');return;}
  const n=prompt('Yeni takım adı:',`Takım ${teams.length+1}`);
  if(n){teams.push({name:n,score:0,pending:0});updateSB();}
}

function updateSB(){
  const sb=document.getElementById('sb'); sb.innerHTML='';
  teams.forEach((t,i)=>{
    const c=document.createElement('div');
    c.className='team-card'+(i===cur?' active':'');
    c.innerHTML=`
      <div class="tname">${t.name}</div>
      <div class="tscore">${t.score}</div>
      ${t.pending>0?`<div class="tpending">+${t.pending} bekliyor</div>`:''}
    `;
    c.ondblclick=()=>{const n=prompt('Takım adı:',t.name);if(n){t.name=n;updateSB();}};
    sb.appendChild(c);
  });
}

// ═══════════════════════════════════════════════════════════════
// YARDIMCILAR
// ═══════════════════════════════════════════════════════════════
function setGuess(v){
  document.getElementById('li').disabled=!v;
  document.getElementById('gb').disabled=!v;
  document.getElementById('slvb').disabled=!v;
  if(v) setTimeout(()=>document.getElementById('li').focus(),50);
}

function showMsg(m,type){
  const b=document.getElementById('msg'); b.textContent=m;
  b.className=`message-box msg-${type}`;
}

function spawnConfetti(){
  const cols=['#f7c948','#ff6b6b','#4ecdc4','#a29bfe','#55efc4','#fd79a8'];
  for(let i=0;i<60;i++){
    setTimeout(()=>{
      const c=document.createElement('div'); c.className='confetti';
      c.style.left=Math.random()*100+'vw'; c.style.top='-10px';
      c.style.background=cols[Math.floor(Math.random()*cols.length)];
      c.style.width=(8+Math.random()*8)+'px'; c.style.height=(8+Math.random()*8)+'px';
      c.style.animationDuration=(1.5+Math.random())+'s';
      document.body.appendChild(c); setTimeout(()=>c.remove(),2500);
    },i*30);
  }
}

// ═══════════════════════════════════════════════════════════════
// BAŞLAT
// ═══════════════════════════════════════════════════════════════
drawWheel(0);
newPuzzle();
updateSB();
</script>
